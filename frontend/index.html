<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart QA</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新建对话
                </button>
            </div>

            <div class="sidebar-content">
                <!-- Chat History -->
                <div class="sidebar-section">
                    <div class="section-title">历史对话</div>
                    <div class="history-list" id="historyList">
                        <div class="history-empty">暂无历史对话</div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="sidebar-section">
                    <div class="section-title">知识库</div>
                    <div class="stats-row clickable" id="statsRow" title="点击查看知识库片段">
                        <span class="stats-label">文档片段</span>
                        <span class="stats-value" id="statsValue">--</span>
                        <svg class="stats-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                    </div>
                </div>

                <!-- Upload -->
                <div class="sidebar-section">
                    <div class="section-title">上传文档</div>
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept=".pdf,.docx,.txt,.md" hidden>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        <span>点击或拖拽上传</span>
                        <span class="upload-hint">PDF / DOCX / TXT / MD</span>
                    </div>
                    <div class="upload-progress" id="uploadProgress">
                        <div class="upload-progress-bar" id="uploadProgressBar" style="width:0%"></div>
                    </div>
                    <div class="upload-status" id="uploadStatus" style="display:none"></div>
                    <!-- Summary card (shown after upload) -->
                    <div class="summary-card" id="summaryCard" style="display:none">
                        <div class="summary-card-header">
                            <span class="summary-doc-type" id="summaryDocType"></span>
                            <button class="summary-close" id="summaryClose">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                        <div class="summary-text" id="summaryText"></div>
                        <div class="summary-keywords" id="summaryKeywords"></div>
                        <div class="summary-topics" id="summaryTopics"></div>
                    </div>
                </div>

                <!-- Document list -->
                <div class="sidebar-section">
                    <div class="section-title">已上传文档</div>
                    <div class="doc-list" id="docList">
                        <div class="doc-empty">暂无文档</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="clear-btn" id="clearChatBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    清空聊天
                </button>
            </div>
        </aside>

        <!-- Mobile sidebar toggle -->
        <button class="sidebar-toggle" id="sidebarToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>

        <!-- Main area -->
        <main class="main">
            <!-- Welcome screen -->
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-logo">
                    <div class="logo-icon">S</div>
                    <h1>Smart QA</h1>
                    <p class="welcome-sub">智能文档问答系统</p>
                </div>
                <div class="quick-actions">
                    <button class="quick-btn" data-question="这个文档的主要内容是什么？">
                        <span class="quick-icon">&#128196;</span>
                        <span>文档主要内容</span>
                    </button>
                    <button class="quick-btn" data-question="请帮我总结一下关键要点">
                        <span class="quick-icon">&#128218;</span>
                        <span>总结关键要点</span>
                    </button>
                    <button class="quick-btn" data-question="有哪些重要的概念需要理解？">
                        <span class="quick-icon">&#128161;</span>
                        <span>重要概念解析</span>
                    </button>
                </div>
            </div>

            <!-- Chat messages -->
            <div class="chat-container" id="chatContainer" style="display:none">
                <div class="messages" id="messages"></div>
            </div>

            <!-- Input area -->
            <div class="input-area">
                <div class="file-preview" id="filePreview" style="display:none"></div>
                <div class="input-wrapper" id="inputWrapper">
                    <button class="attach-btn" id="attachBtn" title="上传文件">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                    </button>
                    <textarea id="chatInput" placeholder="输入你的问题..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                    <button class="stop-btn" id="stopBtn" style="display:none" title="停止生成">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                    </button>
                </div>
                <div class="input-hint">Enter 发送，Shift + Enter 换行</div>
            </div>
        </main>
    </div>

    <!-- Drag Overlay -->
    <div class="drag-overlay" id="dragOverlay" style="display:none">
        <div class="drag-overlay-content">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span class="drag-overlay-title">拖拽文件到此处上传</span>
            <span class="drag-overlay-hint">支持 PDF / DOCX / TXT / MD</span>
        </div>
    </div>

    <!-- Chunks Modal -->
    <div class="modal-overlay" id="chunksModal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h2>知识库片段</h2>
                <button class="modal-close" id="chunksModalClose">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="chunksBody">
                <div class="chunks-loading">加载中...</div>
            </div>
            <div class="modal-footer" id="chunksFooter"></div>
        </div>
    </div>

    <script src="static/js/app.js"></script>
</body>
</html>
